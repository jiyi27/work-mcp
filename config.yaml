server:
  name: work-assistant-mcp
  instructions: "A work-focused MCP server with notification tools for local agents."

logging:
  dir: logs
  level: info

integrations:
  enabled:
    - dingtalk
    - jira

jira:
  # Candidate workflow transition names for "start working on this issue".
  # The model never sends these names directly; the server resolves them internally.
  accept_transitions:
    - 已接收
    - Accept
    - 接收
    - 接收缺陷
    - Start Progress
    - In Progress
  # Candidate workflow transition names for "this issue is fixed and ready for verification".
  resolve_transitions:
    - 已解决
    - Resolved
    - Resolve
    - 完成
    - Done
  attachments:
    # Cap how many Jira images are returned to the model for a single issue.
    max_images: 5
    # Cap the size of each returned image to avoid oversized tool responses.
    max_bytes_per_image: 1048576
