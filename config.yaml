server:
  transport: stdio
  name: work-assistant-mcp
  instructions: "A work-focused MCP server with notification tools for local agents."

logging:
  dir: logs
  level: info

plugins:
  enabled:
    - dingtalk
    - jira

jira:
  # Only these statuses are eligible for jira_get_latest_assigned_issue.
  # Run `uv run python scripts/inspect_jira_issue_workflow.py IOS-123` first to inspect visible Jira statuses.
  latest_assigned_statuses:
    - 重新打开
    - ToDo
  # Target Jira status for jira_start_issue.
  # The server selects the currently available transition whose destination status matches this value.
  start_target_status: 已接受
  # Target Jira status for jira_resolve_issue.
  # The server selects the currently available transition whose destination status matches this value.
  resolve_target_status: 已解决
  attachments:
    # Cap how many Jira images are returned to the model for a single issue.
    max_images: 5
    # Cap the size of each returned image to avoid oversized tool responses.
    max_bytes_per_image: 1048576
