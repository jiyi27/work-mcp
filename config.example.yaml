# =============================================================================
# config.example.yaml — work-mcp configuration reference
#
# Copy this file to config.yaml and fill in your values.
# config.yaml is gitignored; never commit it.
# =============================================================================

# -----------------------------------------------------------------------------
# Logging
# -----------------------------------------------------------------------------
logging:
  # Log directory. Relative paths are resolved from the process working directory
  # (`logs` means `./logs`). Absolute paths are also supported, e.g. /var/log/work-mcp.
  # Default: logs
  dir: logs

  # Log level. Options: debug | info | warning | error
  # Default: info
  level: info


# -----------------------------------------------------------------------------
# Startup health checks
# -----------------------------------------------------------------------------
startup:
  healthcheck:
    # Whether to probe external dependencies of enabled plugins on startup.
    # When enabled, the server will abort startup if any probe fails,
    # helping catch configuration errors early.
    # Currently supported: jira, database. Other plugins only do static config validation.
    # Default: false
    enabled: false

    # Timeout in seconds for each probe.
    # Default: 10
    timeout_seconds: 10


# -----------------------------------------------------------------------------
# Plugin toggles
# Only plugins listed here will have their tools registered.
# Comment out a line to disable all tools from that plugin.
# Options: database | dingtalk | jira | log_search | remote_fs
# -----------------------------------------------------------------------------
plugins:
  enabled:
    - database
    - dingtalk
    - jira
    - log_search
    - remote_fs


# -----------------------------------------------------------------------------
# Plugin: remote_fs
# Required: plugins.enabled contains "remote_fs"
# Provides read-only tools for inspecting server-side files over MCP.
# Each root defines an allowed directory the agent may observe.
# -----------------------------------------------------------------------------
remote_fs:
  roots:
    - name: app
      path: /srv/myapp
      kind: code
      description: Deployed application source

    - name: logs
      path: /var/log/myapp
      kind: logs
      description: Application log files

    - name: config
      path: /etc/myapp
      kind: config
      description: Production configuration


# -----------------------------------------------------------------------------
# Plugin: log_search
# Required: plugins.enabled contains "log_search"
# -----------------------------------------------------------------------------
log_search:
  # Absolute path to the log root directory. Tools can only access files under
  # this directory, which must already exist.
  # Required
  log_base_dir: /absolute/path/to/logs


# -----------------------------------------------------------------------------
# Plugin: dingtalk
# Required: plugins.enabled contains "dingtalk"
# -----------------------------------------------------------------------------
dingtalk:
  # Required: DingTalk robot webhook URL
  webhook_url: https://oapi.dingtalk.com/robot/send?access_token=your_token_here

  # Optional: robot signing secret, only needed when "加签" is enabled on the robot
  secret: SECxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxx


# -----------------------------------------------------------------------------
# Plugin: jira
# Required: plugins.enabled contains "jira"
#
# Status names must match exactly what is defined in the Jira workflow
# (the status name, not the category name).
# Run the following command to inspect the actual status names for your project:
#   uv run python scripts/inspect_jira_issue_workflow.py <ISSUE-KEY>
# -----------------------------------------------------------------------------
jira:
  # Required: Jira instance base URL
  base_url: https://your-jira-instance.example.com

  # Required: Jira API token (generate at https://id.atlassian.com/manage-profile/security/api-tokens)
  api_token: your_jira_api_token_here

  # Required: Jira project key this server is allowed to access
  project_key: PROJECT_KEY

  # The jira_get_latest_assigned_issue tool returns issues in any of these statuses.
  # Required (when jira plugin is enabled)
  latest_assigned_statuses:
    - To Do
    - In Progress

  # The jira_start_issue tool transitions the issue to this status.
  # Required (when jira plugin is enabled)
  start_target_status: In Progress

  # The jira_resolve_issue tool transitions the issue to this status.
  # Required (when jira plugin is enabled)
  resolve_target_status: Resolved

  attachments:
    # Maximum number of images to return per issue. Default: 5
    max_images: 5

    # Maximum size per image in bytes. Images exceeding this limit will only
    # have their metadata returned, not their content.
    # Default: 1048576 (1 MiB)
    max_bytes_per_image: 1048576


# -----------------------------------------------------------------------------
# Plugin: database
# Required: plugins.enabled contains "database"
# Supports SQL Server and MySQL.
# SQL Server requires the Microsoft ODBC Driver for SQL Server on the host.
# The configured database account should be read-only.
# -----------------------------------------------------------------------------
database:
  # Required
  type: sqlserver          # sqlserver | mysql
  host: your-db-host.example.com
  user: readonly_user
  password: your_password_here

  # Optional: defaults to 1433 for sqlserver, 3306 for mysql
  port: 1433

  # Optional: sqlserver only; defaults to "ODBC Driver 18 for SQL Server"
  driver: ODBC Driver 18 for SQL Server

  # Optional: sqlserver only; defaults to false
  trust_server_certificate: true

  # Optional: defaults to 5
  connect_timeout_seconds: 5
